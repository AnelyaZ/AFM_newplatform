services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: afm
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing local/afm-media;
      mc anonymous set download local/afm-media;
      "

  backend:
    build: ./backend
    env_file:
      - ./backend/.env.docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8080:8080'
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npx ts-node prisma/seed.ts && npm run start:dev"
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    environment:
      VITE_BACKEND_URL: http://backend:8080
    depends_on:
      - backend
    ports:
      - '5173:5173'
    command: npm run dev -- --host 0.0.0.0
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data: {}
  minio_data: {}
