services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: b1315bdf1ff04ad5b303705bffe07f5a
      POSTGRES_DB: afm
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2024-12-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    env_file:
      - ./backend/.env.docker
    depends_on:
      - db
      - minio
    ports:
      - '8080:8080'
    command: npm run start:dev
    working_dir: /app
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    command: npm run dev -- --host 0.0.0.0
    working_dir: /app
    volumes:
      - ./frontend:/app

volumes:
  db_data: {}
  minio_data: {}


